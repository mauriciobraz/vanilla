# requires
#   /includes/etc/pam.d/
#     gdm-password
#     common-auth
#     login
#     su

type: apt
name: howdy

sources:
  - packages:
      - build-essential
      - cmake
      - libatlas-base-dev
      - libboost-python-dev
      - libevdev-dev
      - libgtk-3-dev
      - libinih-dev
      - libopencv-dev
      - libpam0g-dev
      - libx11-dev
      - make
      - ninja-build
      - pkg-config
      - python3
      - python3-dev
      - python3-numpy
      - python3-opencv
      - python3-pip
      - python3-setuptools
      - python3-wheel

modules:
  - type: cmake
    name: howdy/dlib
    source:
      type: git
      branch: beta
      commit: d352013
      url: https://github.com/davisking/dlib.git
    buildflags: "-DCMAKE_CXX_FLAGS=-O3 -mtune=generic -fPIC -DCMAKE_BUILD_TYPE=Release -G Ninja"

  - type: meson
    name: howdy/howdy
    sources:
      type: git
      branch: master
      commit: aef35b5
      url: https://github.com/boltgolt/howdy.git
    buildflags:
      - "--buildtype=release"
      - "-Dinstall_pam_config=true"
      - "-Dconfig_dir=/etc/howdy"
      - "-Ddlib_data_dir=/etc/local/dlib"
      - "-Duser_models_dir=/etc/howdy/models"

  - type: shell
    name: howdy/dlib-pam
    commands:
      - |
        DLIB_MODELS=(
          https://github.com/davisking/dlib-models/raw/master/mmod_human_face_detector.dat.bz2
          https://github.com/davisking/dlib-models/raw/master/shape_predictor_5_face_landmarks.dat.bz2
          https://github.com/davisking/dlib-models/raw/master/dlib_face_recognition_resnet_model_v1.dat.bz2
        )

        ln -s $(find / -type f -name pam_howdy.so 2>/dev/null) /usr/lib/x86_64-linux-gnu/security/pam_howdy.so

        mkdir -p /etc/local/dlib && cd /etc/local/dlib
        wget -nc "${DLIB_MODELS[@]}"
        bunzip2 -f *.bz2 \

  - type: shell
    name: howdy/ir-emitter
    commands:
      - |
        wget -q -P /sources \
          $(curl -s https://api.github.com/repos/EmixamPP/linux-enable-ir-emitter/releases/latest \
            | jq -r '.assets[] | select(.name | contains("tar.gz")).browser_download_url') \
      - tar -C / --no-same-owner -m -h -xzf /sources/linux-enable-ir-emitter*.tar.gz
      - rm -f /sources/linux-enable-ir-emitter*.tar.gz
      - systemctl enable linux-enable-ir-emitter

  - type: shell
    name: howdy/perms
    commands:
      - chmod 644 /etc/pam.d/*
      - chown root:root /etc/pam.d/*
      - chmod 644 /etc/local/howdy/*
      - chmod 644 /etc/local/dlib/*.dat
      - chmod 755 /etc/local/{howdy,dlib}
      - chmod 755 /usr/lib/x86_64-linux-gnu/security{,/pam_howdy.so}
