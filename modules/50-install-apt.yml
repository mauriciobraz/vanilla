name: apt-pkgs
type: shell
commands:
  - apt install -y software-properties-common

  - apt-add-repository ppa:fish-shell/release-3
  - add-apt-repository ppa:boltgolt/howdy

  - apt update

  - apt install -y \
    zsh fish jq yq fzf git eza cron \
    entr xsel curl tmux ranger net-tools

  - apt install -y \
    virtualenv python3-venv python3-matplotlib \
    python3-scipy python3-numpy python3-pandas python3-jinja2 python3-plotly \
    python3-pylsp-jsonrpc python3-pylsp-isort python3-pylsp-black python3-pylsp-rope \
    python3-pylsp-mypy python3-pylsp-ruff python3-pylsp python3-dill python3-dask python3-debugpy

  - chmod -R 755 /lib/security/howdy/
